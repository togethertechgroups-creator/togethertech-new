                    "secondary-container": "#2170e4",

<style>
        body {
            background-color: #F8FAFC; /* Explicit Level 0 background from style guidance */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card {
            box-shadow: 0px 4px 12px rgba(30, 41, 59, 0.08); /* Level 2 Shadow */
        }
        .input-focus:focus {
            outline: 2px solid #3B82F6;
            border-color: transparent;
        }
    </style>

<body class="flex items-center justify-center min-h-screen p-md">
<!-- Main Container -->
<main class="w-full max-w-[440px] flex flex-col gap-lg">
<!-- Branding Anchor -->
<header class="flex flex-col items-center gap-sm">
<div class="p-sm bg-primary rounded-lg">
<span class="material-symbols-outlined text-white text-[32px]">account_balance</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight font-extrabold">FinOps Central</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Enterprise Financial Operations</p>
</header>
<!-- Login Card -->
<section class="login-card bg-surface-container-lowest border border-outline-variant p-xl rounded-lg">
<form class="space-y-lg" onsubmit="event.preventDefault();">
<!-- Business Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="email">BUSINESS EMAIL</label>
<div class="relative">
<input class="w-full px-md py-sm border border-outline rounded text-body-md font-body-md bg-white input-focus transition-all duration-200" id="email" name="email" placeholder="name@company.com" required="" type="email">
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-label-caps text-label-caps text-secondary hover:underline" href="#">RESET PASSWORD</a>
</div>
<div class="relative">
<input class="w-full px-md py-sm border border-outline rounded text-body-md font-body-md bg-white input-focus transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm">
<input class="w-4 h-4 text-secondary border-outline rounded focus:ring-secondary transition-colors" id="remember" name="remember" type="checkbox">
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Remember this device for 30 days</label>
</div>
<!-- Sign In Button -->
<button class="w-full bg-secondary hover:bg-[#004bb1] text-white font-title-sm text-title-sm py-md rounded-lg transition-all active:scale-[0.98] flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-xl">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-caps">
<span class="px-sm bg-surface-container-lowest text-on-surface-variant">SECURE ACCESS</span>
</div>
</div>
<!-- SSO Option -->
<button class="w-full flex items-center justify-center gap-md px-md py-md border border-outline rounded-lg hover:bg-surface-container-low transition-colors font-body-md text-body-md text-primary">
<div class="w-5 h-5 flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]">passkey</span>
</div>
                Continue with SSO
            </button>
</section>
<!-- Footer Actions -->
<footer class="flex flex-col items-center gap-md">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-secondary font-semibold hover:underline" href="#">Create an Account</a>
</p>
<div class="flex items-center gap-lg">
<a class="font-label-caps text-label-caps text-on-tertiary-container hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 bg-outline rounded-full"></span>
<a class="font-label-caps text-label-caps text-on-tertiary-container hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<span class="w-1 h-1 bg-outline rounded-full"></span>
<a class="font-label-caps text-label-caps text-on-tertiary-container hover:text-on-surface transition-colors" href="#">Help Center</a>
</div>
</footer>
</main>
<!-- Visual Element: Subtle Gradient background micro-interaction -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-0 right-0 w-[50vw] h-[50vw] bg-secondary/5 rounded-full blur-[120px] translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute bottom-0 left-0 w-[40vw] h-[40vw] bg-primary/5 rounded-full blur-[100px] -translate-x-1/2 translate-y-1/2"></div>
</div>
<script>
        // Simple Micro-interaction for the login button
        const loginForm = document.querySelector('form');
        const submitBtn = loginForm.querySelector('button[type="submit"]');

        loginForm.addEventListener('submit', () => {
            const originalContent = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Authenticating...</span>
            `;
            
            // Mock delay
            setTimeout(() => {
                submitBtn.innerHTML = originalContent;
                submitBtn.disabled = false;
            }, 2000);
        });
    </script>
